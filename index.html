    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
        }
        body {
            /* PALITAN MO ITONG background.jpg NG PILI MONG BACKGROUND PIC MO PRE */
            background: linear-gradient(rgba(254, 246, 240, 0.85), rgba(254, 246, 240, 0.85)), url('background.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* FLOATING BACKGROUND ELEMENTS */
        .floating-deco {
            position: absolute;
            pointer-events: none;
            font-size: 24px;
            animation: floatUpDown 3s ease-in-out infinite;
            z-index: 1;
            opacity: 0.6;
        }
        @keyframes floatUpDown {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(10deg); }
        }

        .book-wrapper {
            perspective: 1500px;
            width: 100%;
            max-width: 950px;
            position: relative;
            z-index: 2;
        }
        
        /* AUDIO STYLING */
        .music-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        #music-ctrl-btn {
            background: #ffe5ec;
            color: #2b2b2b;
            border: 2px solid #2b2b2b;
            box-shadow: 4px 4px 0px #2b2b2b;
            padding: 12px 24px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            border-radius: 30px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        #music-ctrl-btn:hover {
            transform: translateY(-2px);
            box-shadow: 6px 6px 0px #2b2b2b;
            background: #ffb3c1;
        }
        #music-ctrl-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #2b2b2b;
        }

        /* PAGE 1: COVER SCREEN */
        .cover-page {
            background: rgba(255, 255, 255, 0.95);
            border: 4px solid #2b2b2b;
            box-shadow: 10px 10px 0px #2b2b2b;
            border-radius: 20px;
            padding: 40px 25px;
            text-align: center;
            backdrop-filter: blur(5px);
            animation: superPop 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .cover-title {
            margin-bottom: 30px;
        }
        .cover-title h1 {
            font-size: 28px;
            color: #2b2b2b;
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: -1px;
        }
        .cover-title span {
            background: #ffb3c1;
            padding: 6px 20px;
            border: 2px solid #2b2b2b;
            box-shadow: 4px 4px 0px #2b2b2b;
            display: inline-block;
            margin-top: 12px;
            font-weight: bold;
            font-size: 16px;
            border-radius: 6px;
        }
        
        /* COZY PHOTO ALBUM GRID */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
            max-height: 360px;
            overflow-y: auto;
            padding: 15px;
            border: 3px dashed #2b2b2b;
            border-radius: 16px;
            background: rgba(255, 253, 250, 0.8);
        }
        .gallery-item {
            background: white;
            padding: 8px 8px 22px 8px;
            border: 2px solid #2b2b2b;
            box-shadow: 4px 4px 0px #2b2b2b;
            transition: all 0.3s ease;
        }
        .gallery-item:hover {
            transform: scale(1.05) rotate(0deg) !important;
            z-index: 5;
            box-shadow: 6px 6px 0px #ff6b6b;
        }
        .gallery-item:nth-child(3n) { transform: rotate(-3deg); }
        .gallery-item:nth-child(3n+1) { transform: rotate(4deg); }
        .gallery-item:nth-child(3n+2) { transform: rotate(-1.5deg); }
        .gallery-item img {
            width: 100%;
            height: 110px;
            object-fit: cover;
            border: 1px solid #e5dcd3;
            display: block;
        }
        .gallery-gif img {
            object-fit: contain;
            border: none;
            max-height: 95px;
        }

        /* PAGE 2: MAIN SCRAPBOOK CONTAINER */
        .scrapbook-container {
            display: none;
            flex-direction: row;
            width: 100%;
            background: rgba(255, 255, 255, 0.96);
            border: 4px solid #2b2b2b;
            box-shadow: 12px 12px 0px #2b2b2b;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            backdrop-filter: blur(10px);
        }
        .scrapbook-container.active-page {
            display: flex;
            animation: superPop 0.6s cubic-bezier(0.23, 1, 0.32, 1) both;
        }
        .scrapbook-container::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 10px;
            background: linear-gradient(90deg, rgba(0,0,0,0.08) 0%, rgba(0,0,0,0) 50%, rgba(0,0,0,0.08) 100%);
            border-left: 2px dashed #2b2b2b;
            transform: translateX(-50%);
            z-index: 10;
            pointer-events: none;
        }
        .page-left {
            width: 50%;
            padding: 35px 30px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background: #fffdfa;
            position: relative;
            overflow: hidden;
        }
        .page-right {
            width: 50%;
            background: #fffdfa;
            padding: 35px 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .letter-head h1 {
            font-size: 26px;
            color: #2b2b2b;
            text-transform: uppercase;
            font-weight: 900;
        }
        .letter-head span {
            background: #ffb3c1;
            padding: 4px 14px;
            border: 2px solid #2b2b2b;
            box-shadow: 3px 3px 0px #2b2b2b;
            display: inline-block;
            margin-top: 6px;
            font-weight: bold;
            font-size: 14px;
            border-radius: 5px;
        }
        .quiz-body {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        /* SMOOTH SLIDE-IN TRANSITIONS FOR STEPS */
        .step {
            display: none;
            opacity: 0;
        }
        .step.active {
            display: block;
            animation: cuteSlide 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }
        .step h2 {
            font-size: 16px;
            color: #ff6b6b;
            margin-bottom: 12px;
            text-transform: uppercase;
            font-weight: 900;
        }
        .step label {
            display: block;
            font-size: 15px;
            font-weight: bold;
            color: #2b2b2b;
            line-height: 1.6;
            margin-bottom: 15px;
        }
        
        /* TEXT BOXES */
        .custom-field {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #2b2b2b;
            border-radius: 10px;
            font-size: 14px;
            background: #fffdfa;
            color: #2b2b2b;
            outline: none;
            box-shadow: inset 2px 2px 0px rgba(0,0,0,0.05);
            transition: all 0.25s ease;
            -webkit-appearance: none;
        }
        .custom-field:focus {
            background: #ffffff;
            border-color: #ff6b6b;
            box-shadow: 4px 4px 0px #2b2b2b;
            transform: translateY(-2px);
        }
        textarea.custom-field {
            resize: none;
            height: 120px;
        }
        .nav-zone {
            margin-top: 25px;
        }
        .btn-turn {
            background: #ff6b6b;
            color: #fff;
            border: 2px solid #2b2b2b;
            border-radius: 10px;
            padding: 14px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            box-shadow: 4px 4px 0px #2b2b2b;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-turn:hover {
            transform: translateY(-2px);
            box-shadow: 6px 6px 0px #2b2b2b;
        }
        .btn-turn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #2b2b2b;
        }
        
        /* POLAROID & STICKER INTERACTION */
        .polaroid-frame {
            background: white;
            padding: 14px 14px 32px 14px;
            border: 2px solid #2b2b2b;
            box-shadow: 6px 6px 0px #2b2b2b;
            transform: rotate(-2deg);
            width: 100%;
            max-width: 250px;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .polaroid-frame img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border: 1px solid #e5dcd3;
            display: block;
        }
        .gif-frame {
            background: white;
            padding: 12px;
            border: 2px solid #2b2b2b;
            box-shadow: 5px 5px 0px #2b2b2b;
            transform: rotate(3deg);
            width: 100%;
            max-width: 190px;
            height: 130px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: all 0.5s ease;
            animation: gentleWiggle 2.5s ease-in-out infinite alternate;
        }
        .gif-frame img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .audio-holder {
            display: none;
        }

        /* TIMELINE ANIMATIONS */
        @keyframes superPop {
            from { opacity: 0; transform: scale(0.92) translateY(30px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        @keyframes cuteSlide {
            from { opacity: 0; transform: translateX(25px) rotate(1deg); }
            to { opacity: 1; transform: translateX(0) rotate(0deg); }
        }
        @keyframes gentleWiggle {
            0% { transform: rotate(1deg) scale(1); }
            100% { transform: rotate(5deg) scale(1.03); }
        }

        /* MOBILE OPTIMIZATION */
        @media (max-width: 680px) {
            body {
                padding: 12px;
                align-items: flex-start;
            }
            .cover-page {
                padding: 25px 15px;
            }
            .cover-title h1 {
                font-size: 24px;
            }
            .gallery-grid {
                grid-template-columns: repeat(3, 1fr);
                max-height: 280px;
                gap: 8px;
            }
            .scrapbook-container {
                flex-direction: column;
                border-radius: 16px;
            }
            .scrapbook-container::before {
                display: none;
            }
            .page-left, .page-right {
                width: 100%;
                padding: 30px 18px;
            }
            .page-left {
                border-bottom: 3px dashed #2b2b2b;
            }
            .page-right {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
                gap: 15px;
            }
            .polaroid-frame {
                max-width: 47%;
                padding: 8px 8px 24px 8px;
            }
            .polaroid-frame img {
                height: 130px;
            }
            .gif-frame {
                max-width: 45%;
                height: 105px;
            }
            .floating-deco {
                display: none;
            }
        }
    </style>
</head>

    function forcePlay() {
        if (soundTrack.paused) {
            soundTrack.play().then(() => {
                const btn = document.getElementById("music-ctrl-btn");
                if(btn) {
                    btn.innerText = "⏸️ Pause Music";
                    btn.style.background = "#42b72a";
                    btn.style.color = "#fff";
                }
            }).catch(() => console.log("Audio target ready."));
        }
    }

    function toggleMusic() {
        const btn = document.getElementById("music-ctrl-btn");
        if (soundTrack.paused) {
            soundTrack.play()
                .then(() => {
                    btn.innerText = "⏸️ Pause Music";
                    btn.style.background = "#42b72a";
                    btn.style.color = "#fff";
                })
                .catch(err => console.log("Audio blocked:", err));
        } else {
            soundTrack.pause();
            btn.innerText = "🎵 Play Background Music";
            btn.style.background = "#ffe5ec";
            btn.style.color = "#2b2b2b";
        }
    }

    function openOurBook() {

    function syncPage(stepNum, photoIndex, gifIndex) {
        forcePlay();

            notebookPolaroid.style.transform = `rotate(${randomTilt}deg) scale(1.02)`;
            setTimeout(() => {
                notebookPolaroid.style.transform = `rotate(${randomTilt}deg) scale(1)`;
            }, 250);
        }
        if(poolGifs[gifIndex]) {
            document.getElementById("gif-loader").src = poolGifs[gifIndex];
        }
    }

    function nextStep(current, next) {
        document.getElementById("step" + current).classList.remove("active");
        document.getElementById("step" + next).classList.add("active");
        syncPage(next, next % poolPhotos.length, next % poolGifs.length);
    }

    function prevStep(current, prev) {
        document.getElementById("step" + current).classList.remove("active");
        document.getElementById("step" + prev).classList.add("active");
